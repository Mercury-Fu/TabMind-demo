<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TabMind · 标签智理 — 把标签页变成任务记忆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --bg:#eef0f4;--surface:#ffffff;--surface-2:#f3f5f8;--surface-3:#e6e9ee;
  --panel-tint:#f7f8fb;--panel-accent:#eaeef5;
  --border:rgba(15,30,60,.08);--border-2:rgba(15,30,60,.14);
  --text:#15233b;--text-2:#5a6b85;--text-3:#9aa5b8;--text-inv:#fff;
  --accent:#2563eb;--accent-h:#1d4ed8;--accent-bg:rgba(37,99,235,.06);
  --green:#16a34a;--green-bg:rgba(22,163,74,.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,.07);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,.06);
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 12px 40px rgba(0,0,0,.1);
}
[data-theme="dark"]{
  --bg:#111111;--surface:#1a1a1a;--surface-2:#222;--surface-3:#2a2a2a;
  --border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.12);
  --text:#e5e5e5;--text-2:#999;--text-3:#666;--text-inv:#111;
  --accent:#60a5fa;--accent-h:#93bbfd;--accent-bg:rgba(96,165,250,.1);
  --green:#4ade80;--green-bg:rgba(74,222,128,.1);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.1);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.1);
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.4);--shadow-lg:0 12px 40px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;scroll-padding-top:72px}
body{font-family:'Inter','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;min-height:100vh}
button{cursor:pointer;font:inherit;color:inherit;background:none;border:none}
input,textarea{font:inherit;color:inherit}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

.topbar{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.topbar-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;letter-spacing:-.02em}
.brand svg{color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;transition:all .15s;color:var(--text-2)}
.icon-btn:hover{background:var(--surface-2);color:var(--text)}

.shell{max-width:1280px;margin:0 auto;padding:16px 24px 80px}

.hero{text-align:center;padding:48px 0 40px}
.hero h1{font-size:clamp(28px,4vw,42px);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:12px}
.hero h1 span{background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--text-2);max-width:520px;margin:0 auto 24px;font-size:15px}

.pain-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:0 auto 18px;max-width:780px}
.pain-card{flex:1;min-width:200px;max-width:240px;padding:14px 16px;border-radius:14px;background:var(--surface);border:1px solid var(--border);text-align:left}
.pain-label{font-size:12px;font-weight:800;color:var(--red);margin-bottom:4px;letter-spacing:.02em}
.pain-text{font-size:12px;color:var(--text-2);line-height:1.5}

.hero-pills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.pill{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid var(--border)}
.pill-a{background:var(--accent-bg);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 20%,transparent)}
.pill-g{background:var(--green-bg);color:var(--green);border-color:color-mix(in srgb,var(--green) 20%,transparent)}
.pill-p{background:var(--purple-bg);color:var(--purple);border-color:color-mix(in srgb,var(--purple) 20%,transparent)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:12px;font-weight:700;font-size:14px;transition:all .15s}
.btn-primary{background:var(--accent);color:var(--text-inv)}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-ghost{border:1px solid var(--border-2);color:var(--text)}
.btn-ghost:hover{background:var(--surface-2)}
.hero-btns{display:flex;gap:10px;justify-content:center}

.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;justify-content:space-between;padding:10px 12px;background:var(--panel-tint);border:1px solid var(--border);border-radius:14px}
.toolbar-left{display:flex;align-items:center;gap:10px;flex:1}
.toolbar-right{display:flex;align-items:center;gap:10px}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:9px 36px 9px 36px;border:1px solid var(--border-2);border-radius:10px;background:var(--surface);font-size:13px;transition:all .15s}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;display:inline-grid;place-items:center;border-radius:50%;border:none;background:var(--surface-2);color:var(--text-3);cursor:pointer;transition:all .15s;padding:0}
.search-clear:hover{background:var(--text-3);color:var(--surface)}
.search-box .search-clear svg{position:static;transform:none}
.search-box input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none}

.view-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:2px;overflow:hidden}
.view-btn{padding:7px 14px;font-size:12px;font-weight:700;border-radius:8px;color:var(--text-2);transition:all .15s}
.view-btn.active{background:var(--surface-2);color:var(--text);box-shadow:var(--shadow-sm)}


.purge-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;background:var(--red-bg);color:var(--red);border:1px solid color-mix(in srgb,var(--red) 25%,transparent);transition:all .15s;cursor:pointer}
.purge-btn:hover{background:var(--red);color:white;border-color:var(--red);transform:translateY(-1px)}
.dedupe-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;background:var(--accent-bg);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);transition:all .15s;cursor:pointer}
.dedupe-btn:hover{background:var(--accent);color:white;border-color:var(--accent);transform:translateY(-1px)}
.close-all-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:800;background:var(--text);color:var(--surface);border:1px solid var(--text);transition:all .15s;cursor:pointer}
.close-all-btn:hover{background:var(--text-2);border-color:var(--text-2);transform:translateY(-1px);box-shadow:0 4px 12px color-mix(in srgb,var(--text) 22%,transparent)}
.session-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;background:var(--purple-bg);color:var(--purple);border:1px solid color-mix(in srgb,var(--purple) 18%,transparent);transition:all .15s}
.session-btn:hover{background:var(--purple);color:white;transform:translateY(-1px)}

.stats-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:12px}
.stat{background:var(--panel-tint);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.stat-label{font-size:12px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:20px;font-weight:800;line-height:1}
.stat-value.red{color:var(--red)}
.stat-value.amber{color:var(--amber)}
.stat-value.green{color:var(--green)}
@media(max-width:768px){.stats-strip{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.stats-strip{grid-template-columns:1fr;}}

.main-grid{display:grid;grid-template-columns:1fr;gap:20px;align-items:start}

.section-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin:20px 0 8px;display:flex;align-items:center;gap:8px}
.section-label .dot{width:7px;height:7px;border-radius:50%}
.section-label .count{color:var(--text-2);font-weight:600}

.masonry-view { columns: 3 260px; column-gap: 14px; }
.masonry-view .domain-card { break-inside: avoid; margin-bottom: 14px; display: inline-block; width: 100%; }
.lifecycle-board{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;align-items:start}
@media(max-width:900px){.lifecycle-board{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.lifecycle-board{grid-template-columns:1fr}}
.ai-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.ai-keep{color:var(--green);background:var(--green-bg)}
.ai-later{color:var(--amber);background:var(--amber-bg)}
.ai-close{color:var(--red);background:var(--red-bg)}
.life-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:0;min-height:420px}
.life-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid var(--border-2);margin-bottom:4px}
.life-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;letter-spacing:-.01em}
.life-dot{width:8px;height:8px;border-radius:50%}
.life-count{font-size:11px;color:var(--text-2);background:var(--surface-2);padding:1px 8px;border-radius:999px;font-weight:700}
.life-body{display:flex;flex-direction:column;flex:1}
.life-empty{color:var(--text-3);font-size:12px;padding:12px 4px;text-align:center}
.life-footer{margin-top:auto;padding-top:10px;border-top:1px solid var(--border);display:flex;gap:6px}
.life-close-all{flex:1;padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid var(--border);color:var(--text-2);background:transparent;transition:all .15s;cursor:pointer}
.life-close-all:hover{background:var(--red-bg);color:var(--red);border-color:color-mix(in srgb,var(--red) 20%,transparent)}
/* Domain card footer */
.domain-footer{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;gap:6px}
.domain-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;flex-direction:column}
.life-panel{position:relative;overflow:hidden}
.life-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .2s}
.lifecycle-board .life-panel:nth-child(1){background:linear-gradient(180deg,var(--green-bg) 0%,var(--surface) 60px)}
.lifecycle-board .life-panel:nth-child(2){background:linear-gradient(180deg,var(--amber-bg) 0%,var(--surface) 60px)}
.lifecycle-board .life-panel:nth-child(3){background:linear-gradient(180deg,var(--red-bg) 0%,var(--surface) 60px)}
.domain-card{background:var(--surface);box-shadow:var(--shadow-sm)}
.domain-card:hover{box-shadow:var(--shadow-md);transition:box-shadow .2s}
.domain-card{position:relative;overflow:hidden;transition:all .2s}
.domain-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:.5;border-radius:14px 14px 0 0}
.domain-card:nth-child(5n+1)::before{background:var(--accent)}
.domain-card:nth-child(5n+2)::before{background:var(--green)}
.domain-card:nth-child(5n+3)::before{background:var(--amber)}
.domain-card:nth-child(5n+4)::before{background:var(--purple)}
.domain-card:nth-child(5n+5)::before{background:#0ea5e9}
.domain-header{background:var(--panel-tint);margin:-14px -14px 8px;padding:12px 14px;border-radius:14px 14px 0 0;border-bottom:1px solid var(--border)}
.domain-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}


.domain-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border-2)}


.domain-title { font-weight: 700; font-size: 13px; }
.domain-count { font-size: 11px; color: var(--text-2); background: var(--surface-2); padding: 2px 6px; border-radius: 4px; }

.tab-list{display:flex;flex-direction:column;gap:1px}
/* Row card: single line, actions on right */
.tab-card{display:flex;align-items:center;gap:10px;padding:9px 10px;background:transparent;border-radius:9px;transition:background .12s;cursor:default;position:relative}
.tab-card:hover{background:var(--surface-2)}
.tab-card.zombie{opacity:.5}
.tab-card.zombie:hover{opacity:1}
/* Favicon */
.tab-fav{width:20px;height:20px;border-radius:6px;flex-shrink:0;background:var(--surface-2);display:inline-grid;place-items:center;overflow:hidden;position:relative}
.tab-fav img{width:14px;height:14px;border-radius:3px;object-fit:contain;display:block}
.tab-fav-fb{font-size:10px;font-weight:800;color:var(--text-2);width:100%;height:100%;display:grid;place-items:center;background:var(--surface-2)}
/* Title area */
.tab-main{flex:1;min-width:0}
.tab-title{font-size:12px;font-weight:600;color:var(--text);white-space:normal;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tab-note{font-size:11px;color:var(--text-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Age */
.tab-age{font-size:10px;color:var(--text-3);white-space:nowrap;flex-shrink:0;margin-right:2px}
/* Actions: always visible but very subtle */
.tab-actions{display:flex;gap:2px;flex-shrink:0;opacity:1}
.tab-actions button{width:22px;height:22px;display:inline-grid;place-items:center;border-radius:6px;font-size:11px;line-height:1;border:none;background:transparent;transition:all .12s;color:var(--text-3);position:relative}
.tab-actions button:hover{background:var(--surface-3);color:var(--text)}
.tab-actions .close-btn:hover{color:var(--red)}
.tab-actions .archive-btn:hover{color:var(--amber)}
.tab-actions .note-btn:hover{color:var(--accent)}
.tab-actions button::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:10px;font-weight:600;padding:3px 7px;border-radius:5px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s}
.tab-actions button:hover::after{opacity:1}
/* Duplicate badge */
.dup-badge{font-size:10px;font-weight:700;color:var(--amber);padding:1px 5px;border-radius:4px;background:var(--amber-bg);flex-shrink:0}

.session-item{padding:12px;background:var(--surface-2);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.session-item:hover{border-color:var(--border-2);box-shadow:var(--shadow-sm)}
.session-title{font-weight:700;font-size:13px;margin-bottom:4px}
.session-meta{font-size:11px;color:var(--text-3);display:flex;gap:10px;align-items:center}
.session-bar{height:4px;border-radius:999px;background:var(--surface-3);margin-top:8px;overflow:hidden}
.session-bar>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width .4s}

.receipt{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 24px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:14px;z-index:100;transition:transform .35s cubic-bezier(.16,1,.3,1);max-width:520px}
.receipt.show{transform:translateX(-50%) translateY(0)}
.receipt-icon{width:42px;height:42px;border-radius:12px;background:var(--green-bg);color:var(--green);display:grid;place-items:center;flex-shrink:0}
.receipt-text{font-size:13px}
.receipt-text strong{display:block;font-size:14px;margin-bottom:2px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;place-items:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:grid}
.modal{background:var(--surface);border-radius:20px;padding:28px;width:90%;max-width:440px;box-shadow:var(--shadow-lg);max-height:85vh;overflow-y:auto}
.modal.large{max-width:560px}
.modal h3{font-size:17px;font-weight:800;margin-bottom:4px}
.modal p{font-size:13px;color:var(--text-2);margin-bottom:18px}
.modal label{display:block;font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:6px}
.modal input,.modal textarea{width:100%;padding:10px 12px;border:1px solid var(--border-2);border-radius:10px;background:var(--surface-2);font-size:13px;margin-bottom:14px;transition:all .15s}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.modal textarea{min-height:60px;resize:vertical}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

.session-detail{display:none}
.session-detail.open{display:block}
.session-detail .tab-list-mini{display:grid;gap:4px;margin-top:10px}
.session-detail .mini-tab{padding:8px 12px;background:var(--surface-2);border-radius:8px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.session-detail .mini-tab span{color:var(--text-3);font-size:11px}
.restore-btn{margin-top:12px;width:100%;padding:10px;border-radius:10px;font-weight:700;font-size:13px;background:var(--accent);color:var(--text-inv);transition:all .15s}
.restore-btn:hover{background:var(--accent-h)}
.export-btn{margin-top:8px;width:100%;padding:10px;border-radius:10px;font-weight:700;font-size:13px;background:var(--surface-2);border:1px solid var(--border);transition:all .15s}
.export-btn:hover{background:var(--surface-3)}

.nl-result{display:none;padding:12px;background:var(--accent-bg);border:1px solid color-mix(in srgb,var(--accent) 20%,transparent);border-radius:12px;margin-bottom:16px}
.nl-result.show{display:block}
.nl-result h4{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px}
.nl-result p{font-size:12px;color:var(--text-2)}


/* Side panel layout */
.lifecycle-outer{display:flex;align-items:flex-start;gap:0}
.lifecycle-outer .lifecycle-board{flex:1;min-width:0}
.domain-outer .domain-inner{flex:1;min-width:0;columns:3 240px;column-gap:14px}
.domain-outer .domain-inner .domain-card{break-inside:avoid;margin-bottom:14px;display:inline-block;width:100%}
.side-arrow-handle{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:14px;width:32px;align-self:flex-start;margin:0 6px;position:sticky;top:80px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-3);cursor:pointer;transition:all .2s;flex-shrink:0;padding:48px 0 24px;min-height:170px}
.side-arrow-handle:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-2)}
.side-arrow-handle.open{background:var(--surface-2);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 22%,transparent)}
.side-handle-tags{display:flex;flex-direction:column;gap:4px;align-items:center}
.side-handle-tag{writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;font-weight:700;letter-spacing:.04em;line-height:1;white-space:nowrap}
.side-handle-dot{width:5px;height:5px;border-radius:50%;background:var(--border-2)}
.side-panel{width:0;opacity:0;overflow:hidden;flex-shrink:0;transition:width .3s cubic-bezier(.16,1,.3,1),opacity .25s;background:var(--surface);border-radius:14px;border:1px solid transparent}
.side-panel.open{width:280px;opacity:1;overflow:visible;border-color:var(--border);margin-left:6px;background:var(--panel-tint)}
/* Side sections */
.side-section{border-bottom:1px solid var(--border);overflow:hidden}
.side-section:last-child{border-bottom:none}
.side-section-toggle{width:100%;display:flex;align-items:center;gap:8px;padding:12px 14px;background:transparent;border:none;cursor:pointer;text-align:left;transition:background .15s;font-size:12px;font-weight:700;color:var(--text)}
.side-section-toggle:hover{background:var(--surface-2)}
.side-section-toggle.open{color:var(--text)}
.side-section-icon{font-size:13px;line-height:1;flex-shrink:0}
.side-section-label{flex:1;font-size:12px;font-weight:700;letter-spacing:-.01em}

window.regenerateSummary = function(sid){
  const s = SESSIONS.find(x=>x.id===sid);

  const sTabs = DEMO_TABS.filter(t=>t.session===sid && !(window._deletedSessionTabs&&window._deletedSessionTabs.has(t.id)));
  if(!sTabs.length){ showReceipt('<strong>无可总结内容</strong> — 该 Session 暂无网址'); return; }
  // Build a heuristic summary from tab titles + domains + intents
  const domains = [...new Set(sTabs.map(t=>t.domain))].slice(0,4);
  const topics = sTabs.map(t=>t.title.split(/[·:：—\-—]/)[0].slice(0,20)).slice(0,3);
  const intents = sTabs.filter(t=>t.intent).map(t=>t.intent).slice(0,2);
  const sentences = [];
  sentences.push(`围绕「${s.name}」收集了 ${sTabs.length} 个相关网址`);
  if(domains.length) sentences.push(`涵盖 ${domains.join('、')} 等来源`);

};

window._sessionCloseSnapshots = window._sessionCloseSnapshots || {};

window.closeSessionAll = function(sid){
  const sess = SESSIONS.find(s=>s.id===sid);
  if(!sess) return;
  const archivedTabs = DEMO_TABS.filter(t=>t.session===sid && !(window._deletedSessionTabs && window._deletedSessionTabs.has(t.id)));
  const openTabs = tabs.filter(t=>t.session===sid);
  const allIds = new Set([...archivedTabs.map(t=>t.id), ...openTabs.map(t=>t.id)]);
  const totalCount = allIds.size;
  if(!totalCount){
    SESSIONS.splice(SESSIONS.findIndex(s=>s.id===sid), 1);
    if(expandedSession===sid) expandedSession = null;
    updateUI();
    showReceipt(`<strong>Removed empty session</strong> "${sess.name}".`);
    return;
  }
  window._sessionCloseSnapshots[sid] = {
    session: JSON.parse(JSON.stringify(sess)),
    archivedTabs: JSON.parse(JSON.stringify(archivedTabs)),
    openTabs: JSON.parse(JSON.stringify(openTabs))
  };
  const seen = new Set();
  [...openTabs, ...archivedTabs].forEach(t=>{
    if(seen.has(t.id)) return;
    seen.add(t.id);
    const copy = JSON.parse(JSON.stringify(t));
    copy._fromSession = sid;
    pushTrash(copy);
  });
  tabs = tabs.filter(t=>t.session!==sid);
  if(!window._deletedSessionTabs) window._deletedSessionTabs = new Set();
  archivedTabs.forEach(t=>window._deletedSessionTabs.add(t.id));
  SESSIONS.splice(SESSIONS.findIndex(s=>s.id===sid), 1);
  if(expandedSession === sid) expandedSession = null;
  sideOpen=true; sessionSectionOpen=true; closedSectionOpen=true;
  updateUI();
  showReceipt(`<strong>Closed session</strong> "${sess.name}" — ${totalCount} tabs → Recently Closed.`);
};

window.restoreSessionGroup = function(sid){
  const snap = window._sessionCloseSnapshots[sid];
  if(!snap) return;
  const allTabs = [...snap.openTabs, ...snap.archivedTabs];
  const seen = new Set();
  allTabs.forEach(t=>{
    if(seen.has(t.id)) return;
    seen.add(t.id);
    const copy = JSON.parse(JSON.stringify(t));
    copy.session = null;
    delete copy._fromSession;
    if(!tabs.find(x=>x.id===copy.id)) tabs.push(copy);
    const inDemo = DEMO_TABS.find(x=>x.id===copy.id);
    if(inDemo){ inDemo.session = null; }
    if(window._deletedSessionTabs) window._deletedSessionTabs.delete(copy.id);
  });
  const allIds = new Set(allTabs.map(t=>t.id));
  for(let i=trashBin.length-1;i>=0;i--){
    if(allIds.has(trashBin[i].tab.id) && trashBin[i].tab._fromSession === sid) trashBin.splice(i,1);
  }
  delete window._sessionCloseSnapshots[sid];
  sideOpen=true;
  updateUI();
  showReceipt(`<strong>Restored to open tabs</strong> — ${allTabs.length} tabs returned (session removed permanently).`);
};

window.deleteSessionTab = function(tabId){

};

let _audioCtx = null;
function playWhoosh(){
  try{
    if(!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _audioCtx;
    const now = ctx.currentTime;
    // Whoosh: filtered noise sweep
    const bufferSize = ctx.sampleRate * 0.35;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1) * (1 - i/bufferSize); }
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.Q.value = 6;
    filt.frequency.setValueAtTime(2400, now);
    filt.frequency.exponentialRampToValueAtTime(400, now + 0.3);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.18, now + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
    src.connect(filt).connect(g).connect(ctx.destination);
    src.start(now);
    src.stop(now + 0.35);
  }catch(e){/* ignore */}
}

function fireConfetti(originX, originY){
  let canvas = document.getElementById('confetti-canvas');
  if(!canvas){
    canvas = document.createElement('canvas');
    canvas.id = 'confetti-canvas';
    canvas.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999';
    document.body.appendChild(canvas);
  }
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0ea5e9','#f59e0b'];
  const particles = [];
  const N = 28;
  for(let i=0;i<N;i++){
    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random()*7;
    particles.push({
      x: originX, y: originY,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 3,
      g: 0.22 + Math.random()*0.1,
      size: 4 + Math.random()*5,
      rot: Math.random()*Math.PI,
      vrot: (Math.random()-0.5)*0.3,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: 1
    });
  }
  let frame = 0;
  function tick(){
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive = false;
    particles.forEach(p=>{
      p.vy += p.g;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vrot;
      p.life -= 0.018;
      if(p.life>0 && p.y < canvas.height + 20){
        alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
        ctx.restore();
      }
    });
    if(alive && frame < 140) requestAnimationFrame(tick);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  requestAnimationFrame(tick);
}

function celebrateClose(tabId){

function pushTrash(t){
  if(!t) return;
  trashBin.unshift({tab:JSON.parse(JSON.stringify(t)), closedAt:Date.now()});

}

function trashTimeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  return Math.floor(s/3600)+'h ago';
}

function buildTrashHtml(){
  let banners = '';
  if(window._sessionCloseSnapshots){
    for(const sid in window._sessionCloseSnapshots){
      const snap = window._sessionCloseSnapshots[sid];
      const total = snap.openTabs.length + snap.archivedTabs.length;
      banners += `<button class="trash-restore-group" onclick="restoreSessionGroup('${sid}')" title="还原此 Session 的所有 tab 到已打开界面">↺ 还原 Session "${esc(snap.session.name)}" (${total} tabs → 已打开)</button>`;
    }
  }
  if(!trashBin.length && !banners) return `<div class="trash-empty">Nothing here yet</div>`;
  if(!trashBin.length) return banners;
  return banners + trashBin.map((it,idx)=>{
    const t=it.tab;
    const fv=faviconURL(t.domain);
    const initial=(t.domain||'?').charAt(0).toUpperCase();
    return `<div class="trash-row">
      <span class="tab-fav" style="box-shadow:inset 0 0 0 1.5px var(--border-2)">
        <img src="${fv}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='grid';"/>
        <span class="tab-fav-fb" style="display:none">${initial}</span>
      </span>
      <span class="trash-title">${esc(t.title)}</span>
      <span class="trash-time">${trashTimeAgo(it.closedAt)}</span>
      <button class="trash-restore" onclick="restoreTrash(${idx})">↺</button>
    </div>`;
  }).join('');
}

// AI-style suggestion: match tab to existing session by domain/keyword
function suggestSessionForTab(t){
  // Existing session of the tab takes priority
  if(t.session){
    const s = SESSIONS.find(x=>x.id===t.session);
    if(s) return {session:s, isNew:false};
  }
  // Heuristic: see if another tab in the same domain has a session
  const sameDomain = DEMO_TABS.find(x=>x.domain===t.domain && x.session);
  if(sameDomain){
    const s = SESSIONS.find(x=>x.id===sameDomain.session);
    if(s) return {session:s, isNew:false};
  }
  // Keyword matching with existing session names
  const titleLower = (t.title||'').toLowerCase();
  for(const s of SESSIONS){
    const keys = s.name.toLowerCase().split(/[\s·、，,／/]+/).filter(Boolean);
    for(const k of keys){
      if(k.length>=2 && titleLower.includes(k)){
        return {session:s, isNew:false};
      }
    }
  }
  // No match → generate a new session name based on domain or title
  const baseName = (t.domain||'').replace(/^www\./,'').split('.')[0];
  const cap = baseName.charAt(0).toUpperCase() + baseName.slice(1);
  const suggested = cap ? `${cap} · ${new Date().toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'})} 调研` : '新研究主题';
  return {session:{id:'__new__', name:suggested}, isNew:true};
}

function buildArchiveSelectOptions(suggestedId, suggestedName, isNew){
  const sel = document.getElementById('archiveSessionSelect');
  let html = '';
  SESSIONS.forEach(s=>{
    html += `<option value="${s.id}">${esc(s.name)}</option>`;
  });
  // The "create new" option always has value __new__; pre-fill with AI suggestion if isNew
  html += `<option value="__new__">＋ 新建 Session…</option>`;
  sel.innerHTML = html;
  if(isNew){
    sel.value = '__new__';
  } else {
    sel.value = suggestedId;
  }
}

window.onArchiveSelectChange = function(){

  }
};

window.openArchiveModal = function(id){
  const t = tabs.find(x=>x.id===id);
  if(!t) return;
  archiveTarget = id;
  const sug = suggestSessionForTab(t);
  document.getElementById('archiveTabTitle').textContent = t.title;
  document.getElementById('archiveNote').value = t.intent || '';
  const newInput = document.getElementById('archiveSessionNew');
  newInput.value = sug.isNew ? sug.session.name : '';
  newInput.dataset.suggested = sug.isNew ? sug.session.name : '';
  buildArchiveSelectOptions(sug.session.id, sug.session.name, sug.isNew);
  onArchiveSelectChange();
  document.getElementById('archiveModal').classList.add('open');
  setTimeout(()=>document.getElementById('archiveNote').focus(),100);
};

window.cancelArchive = function(){
  document.getElementById('archiveModal').classList.remove('open');

};

window.saveArchive = function(){
  const t = tabs.find(x=>x.id===archiveTarget);
  if(!t){ document.getElementById('archiveModal').classList.remove('open'); return; }
  const note = document.getElementById('archiveNote').value.trim();
  const sel = document.getElementById('archiveSessionSelect');
  let sess, isNew = false;
  if(sel.value === '__new__'){
    const sessionName = document.getElementById('archiveSessionNew').value.trim() || '新研究主题';
    sess = SESSIONS.find(s=>s.name===sessionName);
    if(!sess){
      const newId = 's_' + Date.now();
      sess = {id:newId, name:sessionName, time:'刚刚', completion:0.1, summary:''};
      SESSIONS.push(sess);
      isNew = true;
    }
  } else {
    sess = SESSIONS.find(s=>s.id===sel.value);
    if(!sess){ document.getElementById('archiveModal').classList.remove('open'); return; }
  }
  if(note) t.intent = note;
  t.session = sess.id;
  sess.time = '刚刚';
  const archivedCopy = JSON.parse(JSON.stringify(t));
  const existsInDemo = DEMO_TABS.find(x=>x.id===t.id);
  if(existsInDemo){
    existsInDemo.session = sess.id;
    existsInDemo.intent = t.intent;
    if(window._deletedSessionTabs) window._deletedSessionTabs.delete(t.id);
  } else {
    DEMO_TABS.push(archivedCopy);
  }
  tabs = tabs.filter(x=>x.id!==t.id);
  document.getElementById('archiveModal').classList.remove('open');
  archiveTarget = null;
  sideOpen=true; sessionSectionOpen=true; closedSectionOpen=false; expandedSession = sess.id;
  updateUI();
  showReceipt(`<strong>Archived</strong> "${t.title.slice(0,22)}…" → <em>${sess.name}</em>${isNew?' <span style="color:var(--accent)">(new)</span>':''}`);
};

window.closeDomain=function(domain){

  sideOpen=true; closedSectionOpen=true;

};
window.dedupeGroup=function(domain){
  const seen=new Map();const removed=[];
  tabs.forEach(t=>{
    if(t.domain!==domain){return;}
    const key=t.url||t.title;
    if(!seen.has(key)){seen.set(key,t);}
    else{const kept=seen.get(key);if(t.intent&&!kept.intent){removed.push(kept);seen.set(key,t);}else{removed.push(t);}}
  });
  if(!removed.length){showReceipt(`<strong>无重复</strong>`);return;}
  const rmIds=new Set(removed.map(t=>t.id));
  tabs=tabs.filter(t=>!rmIds.has(t.id));
  updateUI();
  showReceipt(`<strong>去重完成</strong>合并了 ${removed.length} 个 ${domain} 重复页面。`);
};
function dedupe(){
  const seen = new Map();
  const removed = [];
  // Prefer to keep tabs with intent saved, otherwise the freshest one (lowest id idx in list)
  tabs.forEach(t=>{
    const key = t.url || t.title;
    if(!seen.has(key)) { seen.set(key, t); }
    else {
      const kept = seen.get(key);
      // Replace kept with current if current has intent and kept doesn't
      if(t.intent && !kept.intent){ removed.push(kept); seen.set(key, t); }
      else { removed.push(t); }
    }
  });
  if(removed.length===0){ showReceipt(`<strong>无重复</strong>当前没有发现重复网站。`); return; }
  const keepIds = new Set([...seen.values()].map(t=>t.id));
  tabs = tabs.filter(t=>keepIds.has(t.id));
  updateUI();
  showReceipt(`<strong>去重完成</strong>合并了 ${removed.length} 个重复网站，保留意图最完整的版本。`);
}

function updateUI() { renderTabs(); renderStats(); updateCloseAllCount(); }
function updateCloseAllCount(){ const el=document.getElementById('closeAllCount'); if(el) el.textContent=tabs.length; }

window.showSession=function(sid){
  // Now handled inline via toggleExpandSession
  window.toggleExpandSession(sid);
};

window.restoreSession=function(sid){
  const sTabs=DEMO_TABS.filter(t=>t.session===sid);
  sTabs.forEach(st=>{ if(!tabs.find(t=>t.id===st.id)){ tabs.push(JSON.parse(JSON.stringify(st))); } });
  updateUI();
  document.getElementById('sessionsModalOverlay').classList.remove('open');
  showReceipt(`<strong>Session 已恢复</strong>${sTabs.length} 个标签页已重新加载到当前视图。`);
};

window.exportSession=function(sid){
  const s=SESSIONS.find(x=>x.id===sid);
  const sTabs=DEMO_TABS.filter(t=>t.session===sid);
  let md=`# ${s.name}\n\n> ${s.summary}\n\n**时间**: ${s.time} | **完成度**: ${Math.round(s.completion*100)}%\n\n## 关键标签页\n\n`;
  sTabs.forEach(t=>{md+=`- **${t.title}** (${t.domain})\n  - 意图: ${t.intent||'未记录'}\n  - 下一步: ${t.next||'未记录'}\n\n`;});
  const blob=new Blob([md],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`session-${sid}.md`;
  a.click();
  showReceipt(`<strong>已导出</strong>Session「${s.name}」已下载为 Markdown 文件。`);
};

function tryNLSearch(q){
  const words=q.split(/\s+/);
  let matched=new Set();
  words.forEach(w=>{
    Object.entries(NL_MATCHES).forEach(([k,v])=>{
      if(w.includes(k)) v.forEach(s=>matched.add(s));
    });
  });
  if(matched.size){
    const sessions=[...matched].map(id=>SESSIONS.find(s=>s.id===id)).filter(Boolean);
    const el=document.getElementById('nlResult');
    el.classList.add('show');
    window._tempOpenSession = function(sid) {
       document.getElementById('sessionsModalOverlay').classList.add('open');
       renderSessions();
       showSession(sid);
    };
    el.innerHTML=`<h4>🔍 匹配到 ${sessions.length} 个研究会话</h4>` +
      sessions.map(s=>`<p style="margin-top:6px"><strong>${s.name}</strong> — ${s.summary} <button style="color:var(--accent);font-weight:700;text-decoration:underline;font-size:12px;background:none;border:none;cursor:pointer" onclick="_tempOpenSession('${s.id}')">查看 →</button></p>`).join('');
  } else hideNL();
}
function hideNL(){document.getElementById('nlResult').classList.remove('show');}

function showReceipt(html){
  const r=document.getElementById('receipt');
  document.getElementById('receiptText').innerHTML=html;
  r.classList.add('show');
  setTimeout(()=>r.classList.remove('show'),3500);
}
function esc(s){return s?s.replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function extractDomain(s){try{return new URL(s).hostname}catch{return s.split('/')[0]||'unknown'}}
function randomAge(){const a=['1h','3h','6h','1d','2d','4d','7d','10d'];return a[Math.floor(Math.random()*a.length)]}
</script>
